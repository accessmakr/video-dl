services:
  - type: web
    name: videodl-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    rootDir: backend
    envVars:
      - key: API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://video-dnlr.netlify.app
    healthCheckPath: /health
    autoDeploy: true
