[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from   = "/api/cobalt"
  to     = "/.netlify/functions/cobalt"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
