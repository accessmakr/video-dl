[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Embedder-Policy = "credentialless"
    Cross-Origin-Opener-Policy   = "same-origin"

[build]
  command = "cd frontend && npm install && npm run build"
  publish = "frontend/dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from   = "/api/preview"
  to     = "/.netlify/functions/preview"
  status = 200

[[redirects]]
  from   = "/api/cobalt"
  to     = "/.netlify/functions/cobalt"
  status = 200

[[redirects]]
  from   = "/api/convert/job"
  to     = "/.netlify/functions/convert-job"
  status = 200

[[redirects]]
  from   = "/api/convert/status/*"
  to     = "/.netlify/functions/convert-status/:splat"
  status = 200

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
